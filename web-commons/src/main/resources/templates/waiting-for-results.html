<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Parsing in progress - GC Log Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <script type="text/javascript" th:src="@{/webjars/jquery/2.2.4/jquery.min.js}"></script>
    <script type="text/javascript" th:src="@{/webjars/axios/0.21.1/dist/axios.min.js}"></script>
</head>
<body>
<div class="centered-page">
    <div class="card">
        <div class="card-body">
            <h3 style="display: flex; align-items: center; margin-bottom: 0.75rem;">
                <span class="spinner"></span>
                Parsing in progress...
            </h3>
            <p class="text-secondary" style="font-size: 0.875rem; margin-bottom: 0.5rem;">
                Parsing id:
                <!--/*@thymesVar id="initialStatus" type="pl.ks.profiling.safepoint.analyzer.web.ParsingStatus"*/-->
                <span class="text-mono" th:utext="${initialStatus.parsingId}"></span>
            </p>
            <p class="text-secondary" style="font-size: 0.875rem;">
                You will be redirected automatically upon completion. You can also copy the address of this page and visit it later.
            </p>
            <p id="currentStatus" style="margin-top: 1rem; font-size: 0.875rem;">Waiting for worker...</p>
        </div>
    </div>
</div>
<script type="text/javascript">
    $(document).ready(function () {
        var parsingId = "[[${initialStatus.parsingId}]]";
        askForStatus();
        var keepQuerying = setInterval(askForStatus, 1000);

        function setCurrentStatus(innerHtml) {
            document.getElementById("currentStatus").innerHTML = innerHtml;
        }

        function setErrorStatus() {
            setCurrentStatus('<div class="alert alert-danger" style="margin: 0;">Something went wrong. Contact <a href="mailto:ks@gclogs.com">ks@gclogs.com</a> to help us improve this tool.</div>');
        }

        function askForStatus() {
            axios.get('/parsings/' + parsingId + '/status', {})
                .then(function (response) {
                    var responseData = response.data;
                    if (responseData.finished) {
                        clearInterval(keepQuerying);
                        window.location.href = '/parsings/' + parsingId;
                    } else {
                        var failed = responseData.failed;
                        if (!failed) {
                            var processedFormatted = responseData.processedLines.toLocaleString();
                            var currentFileNumber = responseData.currentFileNumber;
                            var totalNumberOfFiles = responseData.totalNumberOfFiles;
                            var linesPerSecond = responseData.linesPerSecond.toLocaleString();
                            setCurrentStatus('Reading file ' + currentFileNumber + ' of ' + totalNumberOfFiles + '. Already processed ' + processedFormatted + ' lines (average speed: ' + linesPerSecond + ' lines per second)');
                        } else {
                            clearInterval(keepQuerying);
                            setErrorStatus();
                        }
                    }
                })
                .catch(function (error) {
                    console.error(error);
                    setErrorStatus();
                });
        }
    });
</script>
</body>
</html>
